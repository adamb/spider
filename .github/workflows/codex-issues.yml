name: Codex - Fix Issues

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

jobs:
  fix-issue:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issues') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@codex'))
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5

      - name: Run Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: danger-full-access
          codex-args: '["--ask-for-approval", "never", "--ephemeral"]'
          prompt: |
            An issue was filed: "${{ github.event.issue.title }}"

            ${{ github.event.issue.body }}

            Analyze this issue, implement a fix, run relevant tests, and open a pull request.
            Use the GitHub CLI with GH_TOKEN to create the pull request.
            In the PR description, include "Closes #${{ github.event.issue.number }}"
            so the issue is automatically closed when the PR is merged.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
