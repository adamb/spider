name: Claude Code - Fix Issues

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

jobs:
  fix-issue:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issues') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-base-action@beta
        with:
          anthropic_api_key: ${{ secrets.OLLAMA_API_KEY }}
          model: "kimi-k2.7-code:cloud"
          max_turns: "20"
          prompt: |
            An issue was filed: "${{ github.event.issue.title }}"

            ${{ github.event.issue.body }}

            Analyze this issue, implement a fix, and open a pull request.
        env:
          ANTHROPIC_BASE_URL: https://ollama.com
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.OLLAMA_API_KEY }}
          ANTHROPIC_API_KEY: ""
          API_TIMEOUT_MS: "3000000"