name: Claude Code - Fix Issues

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

jobs:
  fix-issue:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issues') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 3

      - name: Pull model
        run: ollama pull qwen2.5:3b

      - name: Analyze issue and create PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # Generate fix using Ollama
          RESPONSE=$(ollama run qwen2.5:3b "
            Issue: $ISSUE_TITLE
            Description: $ISSUE_BODY
            
            Analyze this GitHub issue and provide:
            1. A brief explanation of the problem
            2. A concrete fix (code changes, config updates, or documentation)
            3. The exact files that need to be changed
            
            Format your response as:
            EXPLANATION: <your explanation>
            FILES: <comma-separated list of files>
            DIFF: <unified diff format patch>
          ")
          
          # Extract the diff and create branch
          BRANCH_NAME="auto-fix/issue-$ISSUE_NUMBER"
          git checkout -b "$BRANCH_NAME"
          
          # Parse response and apply changes (simplified - just create a docs file for now)
          echo "# Fix for Issue #$ISSUE_NUMBER: $ISSUE_TITLE" > fix-summary.md
          echo "" >> fix-summary.md
          echo "$RESPONSE" >> fix-summary.md
          
          git add fix-summary.md
          git commit -m "Auto-fix for issue #$ISSUE_NUMBER: $ISSUE_TITLE"
          git push -u origin "$BRANCH_NAME"
          
          # Create PR
          gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "Auto-fix: $ISSUE_TITLE" \
            --body "Automated fix for #$ISSUE_NUMBER generated by Ollama (qwen2.5:3b)"
